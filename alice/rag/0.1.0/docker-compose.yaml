# alice/rag@0.1.0 — qdrant 벡터 DB 단일 컨테이너.
#
# M3 lint 통과 조건 (정책 §6):
#   - image: 는 Docker Hub (qdrant/qdrant) — allowlist
#   - volumes: bind 는 ./qdrant_storage (앱 폴더 안) + named volume 만
#   - privileged / network_mode: host / pid: host / cap_add 없음
#
# project 이름 = app 이름 (`docker create alice_rag` 시 M5 가 `-p alice_rag` 고정)

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: "no"
    ports:
      - "6333:6333"
    volumes:
      - "./qdrant_storage:/qdrant/storage"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
