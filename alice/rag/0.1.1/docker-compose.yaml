# alice/rag@0.1.1 — qdrant + redis(캐시).
#
# 0.1.0 대비:
#   - qdrant image tag 를 `v1.11.0` 으로 pin
#   - redis 캐시 컨테이너 추가 (named volume)
#
# M3 lint 통과 조건 동일.

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: "no"
    ports:
      - "6333:6333"
    volumes:
      - "./qdrant_storage:/qdrant/storage"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333

  cache:
    image: redis:7
    restart: "no"
    volumes:
      - cache_data:/data

volumes:
  cache_data:
